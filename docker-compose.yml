networks:
  traefik:
    external: true
  appnet:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    container_name: mtg-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mtg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mtg}
      POSTGRES_DB: ${POSTGRES_DB:-mtg_meta}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mtg} -d ${POSTGRES_DB:-mtg_meta}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate
    container_name: mtg-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro
    networks:
      - appnet
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-mtg}:${POSTGRES_PASSWORD:-mtg}@db:5432/${POSTGRES_DB:-mtg_meta}?sslmode=disable
      - up

  backend:
    build:
      context: ./backend
    container_name: mtg-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-mtg}:${POSTGRES_PASSWORD:-mtg}@db:5432/${POSTGRES_DB:-mtg_meta}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - appnet

  <SERVICE_NAME>:
    build:
      context: .
    container_name: <SERVICE_NAME>
    restart: unless-stopped
    environment:
      BACKEND_ORIGIN: http://backend:8080
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-}
    depends_on:
      - backend
    networks:
      - appnet
      - traefik
    labels:
      - traefik.enable=true
      # Container is multi-homed; tell Traefik which network to route on.
      - traefik.docker.network=traefik
      - traefik.http.routers.<ROUTER_NAME>.rule=Host(`<DOMAIN>`)
      - traefik.http.routers.<ROUTER_NAME>.tls=true
      - traefik.http.routers.<ROUTER_NAME>.tls.certresolver=lets-encrypt
      - traefik.http.services.<ROUTER_NAME>.loadbalancer.server.port=<INTERNAL_PORT>
