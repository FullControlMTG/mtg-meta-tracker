services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mtg
      POSTGRES_PASSWORD: mtg
      POSTGRES_DB: mtg_meta
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtg -d mtg_meta"]
      interval: 5s
      timeout: 3s
      retries: 10
