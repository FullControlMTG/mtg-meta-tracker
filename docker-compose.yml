networks:
  traefik:
    external: true
  appnet:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    container_name: mtg-cube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - /pwspool/software/mtg-meta-tracker/postgres:/var/lib/postgresql/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Docker creates a missing bind-mount source as root:root, but the backend runs
  # as uid 10001 and has to write downloaded card images into it — so without this
  # every image download fails with EACCES and the card endpoint 502s. Run-once
  # (no restart policy); a no-op once the ownership is already correct.
  images-init:
    image: alpine:3.20
    container_name: mtg-cube-images-init
    user: "0:0"
    volumes:
      - /pwspool/software/mtg-meta-tracker/images:/data/images
    command: chown -R 10001:10001 /data/images
    networks:
      - appnet

  backend:
    build:
      context: ./backend
    container_name: mtg-cube-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?sslmode=disable
      IMAGE_CACHE_DIR: /data/images
    volumes:
      - /pwspool/software/mtg-meta-tracker/images:/data/images
    depends_on:
      db:
        condition: service_healthy
      images-init:
        condition: service_completed_successfully
    networks:
      - appnet

  frontend:
    build:
      context: .
      args:
        BACKEND_ORIGIN: http://backend:8080
    container_name: mtg-cube-frontend
    restart: unless-stopped
    environment:
      BACKEND_ORIGIN: http://backend:8080
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:?REVALIDATE_SECRET is required}
    depends_on:
      - backend
    networks:
      - appnet
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.mtg-frontend.rule=Host(`cube.fullcontrolmtg.com`)
      - traefik.http.routers.mtg-frontend.tls=true
      - traefik.http.routers.mtg-frontend.tls.certresolver=lets-encrypt
      - traefik.http.services.mtg-frontend.loadbalancer.server.port=3000
